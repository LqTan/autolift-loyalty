spring:
  application:
    name: autolift
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: sandbox
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: false
    default-schema: sandbox
    schemas:
      - sandbox
      - campaign
      - customer
      - voucher
      - promotion
      - loyalty
      - targeting
      - explainability
      - ml
      - notification
    locations:
      - classpath:db/migration/sandbox
      - classpath:db/migration/campaign
      - classpath:db/migration/customer
      - classpath:db/migration/voucher
      - classpath:db/migration/promotion
      - classpath:db/migration/loyalty
      - classpath:db/migration/targeting
      - classpath:db/migration/explainability
      - classpath:db/migration/ml
      - classpath:db/migration/notification
  modulith:
    runtime:
      flyway:
        enabled: false
    events:
      jpa:
        persistence:
          enabled: false
  config:
    jwt:
      secret: ${JWT_SECRET:defaultSecretKeyForDevelopmentOnlyNotForProductionUse123456789012345678}
      expiration: 86400000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
  batch:
    jdbc:
      initialize-schema: never
      table-prefix: batch.BATCH_
    job:
      enabled: false
  cache:
    type: redis
    redis:
      time-to-live: 3600000
      cache-null-values: false

server:
  port: 8080
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  tomcat:
    max-swallow-size: 100MB

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,modulith
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  health:
    defaults:
      enabled: true
    db:
      enabled: true
    redis:
      enabled: true
  info:
    env:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
  observability:
    tracing:
      enabled: false
  logging:
    file:
      name: logs/autolift.log
    pattern:
      file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

---
spring:
  config:
    activate:
      on-profile: test

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

---
spring:
  config:
    activate:
      on-profile: prod

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  logging:
    level:
      root: INFO
      com.autolift: INFO
    file:
      name: /var/log/autolift/autolift.log