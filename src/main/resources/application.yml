spring:
  application:
    name: autolift
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: sandbox
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: false
    default-schema: sandbox
    schemas:
      - sandbox
      - campaign
      - promotion
    locations:
      - classpath:db/migration/sandbox
      - classpath:db/migration/campaign
      - classpath:db/migration/promotion
  modulith:
    runtime:
      flyway:
        enabled: false