spring:
  application:
    name: autolift
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: sandbox
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: false
    default-schema: sandbox
    schemas:
      - sandbox
      - campaign
      - customer
      - voucher
      - promotion
      - loyalty
      - targeting
      - explainability
      - ml
      - notification
    locations:
      - classpath:db/migration/sandbox
      - classpath:db/migration/campaign
      - classpath:db/migration/customer
      - classpath:db/migration/voucher
      - classpath:db/migration/promotion
      - classpath:db/migration/loyalty
      - classpath:db/migration/targeting
      - classpath:db/migration/explainability
      - classpath:db/migration/ml
      - classpath:db/migration/notification
  modulith:
    runtime:
      flyway:
        enabled: false
    events:
      jpa:
        persistence:
          enabled: false
  config:
    jwt:
      secret: ${JWT_SECRET:defaultSecretKeyForDevelopmentOnlyNotForProductionUse123456789012345678}
      expiration: 86400000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
  cache:
    type: redis
    redis:
      time-to-live: 3600000
      cache-null-values: false

server:
  port: 8080